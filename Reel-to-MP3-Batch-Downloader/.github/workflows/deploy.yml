name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for requesting the OIDC token from GitHub

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Python & HF Hub CLI
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub
        run: pip install --upgrade huggingface_hub

      - name: Deploy to Hugging Face Hub
        env:
          HF_OIDC_RESOURCE: iftiaj/Reel-to-MP3-Batch-Downloader
        run: |
          python -c "
          from huggingface_hub import upload_folder
          upload_folder(
              folder_path='.',
              repo_id='iftiaj/Reel-to-MP3-Batch-Downloader',
              repo_type='space'
          )
          "
