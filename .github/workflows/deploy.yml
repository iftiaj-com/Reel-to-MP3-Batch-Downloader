name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Python & HF Hub CLI
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install huggingface_hub

      - name: Force-with-lease push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create repo if it doesn't exist
          hf repo create my-model --token $HF_TOKEN --yes
          # Add Hugging Face remote
          git remote add hf https://user:$HF_TOKEN@huggingface.co/iftiaj/Reel-to-MP3-Batch-Downloader
          # Push with safer force option
          git push hf main --force-with-lease
