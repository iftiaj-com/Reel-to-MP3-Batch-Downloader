name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for requesting the OIDC token from GitHub

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Python & HF Hub CLI
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub
        run: pip install --upgrade huggingface_hub

      - name: Authenticate to Hugging Face
        # Exchange OIDC token for a temporary session token
        run: huggingface-cli login --token-oidc

      - name: Push to Hugging Face
        run: |
          git remote add hf https://huggingface.co/spaces/iftiaj-com/Reel-to-MP3-Batch-Downloader
          git push --force hf main
